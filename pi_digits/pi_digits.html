<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Digits Viewer</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111b2d;
      --panel: #161f38;
      --text: #e8eef6;
      --muted: #a6b1c2;
      --accent: #52b0ff;
      --danger: #ff5c5c;
      --border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #14204b 0%, var(--bg) 70%);
      color: var(--text);
      padding: 32px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      padding: 28px;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: 0.01em;
    }

    p {
      margin-top: 10px;
      margin-bottom: 20px;
      line-height: 1.55;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
    }

    input,
    button {
      font-size: 1rem;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      outline: none;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    input:focus {
      border-color: rgba(82, 176, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(82, 176, 255, 0.22);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-top: 8px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .card__main {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 22px;
      align-items: start;
      margin-top: 18px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .controls .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .controls .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      font-size: 0.95rem;
      color: var(--muted);
    }

    #progressBar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    #timer,
    #progress {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .output {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .output__header {
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .output__content {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 32, 60, 0.82);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.35;
      max-height: 360px;
      overflow: auto;
      word-break: break-all;
      white-space: pre-wrap;
    }

    #warning {
      margin-top: 12px;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="card">
    <header class="card__header">
      <div>
        <h1>Pi digits (approx)</h1>
        <p>
          Pi is an <strong>infinite, non-repeating</strong> number, so we can only show a finite amount of digits.
          There is no enforced maximum; the computation will keep running until the requested number of digits is reached or you stop it.
        </p>
      </div>

      <div class="status">
        <div id="timer">Elapsed: 0.0s | ETA: --</div>
        <div id="progress">Ready</div>
      </div>
    </header>

    <main class="card__main">
      <section class="controls">
        <div class="field">
          <label for="digits">Digits of π</label>
          <input id="digits" type="number" value="200" min="1" />
        </div>

        <div class="actions">
          <button id="compute">Compute π digits</button>
          <button id="stop" disabled>Stop</button>
        </div>

        <div id="warning"></div>
        <progress id="progressBar" value="0" max="0"></progress>
      </section>

      <section class="output">
        <div class="output__header">Output</div>
        <div id="output" class="output__content"></div>
      </section>
    </main>
  </div>

  <script>
    const outputEl = document.getElementById("output");
    const warningEl = document.getElementById("warning");
    const progressEl = document.getElementById("progress");
    const timerEl = document.getElementById("timer");
    const progressBar = document.getElementById("progressBar");
    const computeBtn = document.getElementById("compute");
    const stopBtn = document.getElementById("stop");

    let worker;

    function startWorker(n) {
      if (typeof Worker === "undefined") {
        warningEl.textContent = "Web Workers are not supported in this browser.";
        return;
      }

      // Create a worker from an inline blob so the page works even when opened via file://
      const workerScript = `
        self.onmessage = (event) => {
          const { type, digits, chunk } = event.data;
          if (type === "start") {
            computePi(digits, chunk || 1000);
          }
        };

        function computePi(n, chunkSize) {
          let q = 1n;
          let r = 0n;
          let t = 1n;
          let k = 1n;
          let nDigit = 3n;
          let l = 3n;

          let produced = 0;
          let buffer = "";

          postMessage({ type: "started", digits: n });

          while (produced < n) {
            if (4n * q + r - t < nDigit * t) {
              buffer += nDigit.toString();

              const qNew = q * 10n;
              const rNew = 10n * (r - nDigit * t);
              const nNew = (10n * (3n * q + r)) / t - 10n * nDigit;

              q = qNew;
              r = rNew;
              nDigit = nNew;

              produced += 1;
            } else {
              const qNew = q * k;
              const rNew = (2n * q + r) * l;
              const tNew = t * l;
              const nNew = (q * (7n * k + 2n) + r * l) / (t * l);

              q = qNew;
              r = rNew;
              t = tNew;
              k += 1n;
              nDigit = nNew;
              l += 2n;
            }

            if (buffer.length >= chunkSize || produced >= n) {
              postMessage({ type: "chunk", digits: buffer, produced: Number(produced), total: Number(n) });
              buffer = "";
            }
          }

          postMessage({ type: "done" });
        }
      `;

      const blob = new Blob([workerScript], { type: "application/javascript" });
      const url = URL.createObjectURL(blob);
      worker = new Worker(url);

      worker.onerror = (event) => {
        warningEl.textContent = `Worker error: ${event.message}`;
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      };

      worker.onmessageerror = (event) => {
        warningEl.textContent = "Worker message handling error.";
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      };

      let hasWrittenFirst = false;

      let outputBuffer = "";
      let lastUpdate = 0;
      let startTime = 0;
      let lastProduced = 0;
      let avgRate = null;

      worker.onmessage = (event) => {
          const { type, digits, produced, total } = event.data;

          if (type === "started") {
            warningEl.textContent = "";
            outputEl.textContent = "";

            // Ensure progress bar max is a number.
            progressBar.max = Number(digits);
            progressBar.value = 0;
            progressEl.textContent = `Starting computation for ${digits} digits...`;
            timerEl.textContent = `Elapsed: 0.0s | ETA: calculating...`;
            computeBtn.disabled = true;
            stopBtn.disabled = false;
            hasWrittenFirst = false;
            outputBuffer = "";
            startTime = performance.now();
            lastProduced = 0;
            lastUpdate = performance.now();
            return;
          }

          if (type === "progress") {
            const producedNum = Number(produced);
            const totalNum = Number(total);

            // Smooth ETA using the same rate tracker as digit output.
            const now = performance.now();
            const deltaProduced = producedNum - lastProduced;
            const deltaTime = (now - lastUpdate) / 1000;
            const instantRate = deltaProduced / Math.max(deltaTime, 0.001);
            avgRate = avgRate === null ? instantRate : avgRate * 0.80 + instantRate * 0.20;
            lastProduced = producedNum;
            lastUpdate = now;

            const elapsed = (now - startTime) / 1000;
            const remaining = Math.max(0, totalNum - producedNum);
            const eta = avgRate > 0 ? remaining / avgRate : 0;

            progressBar.max = totalNum;
            progressBar.value = producedNum;
            progressEl.textContent = `Computed ${producedNum} / ${totalNum} digits (${(producedNum / totalNum * 100).toFixed(1)}%)`;
            timerEl.textContent = `Elapsed: ${elapsed.toFixed(1)}s | ETA: ${eta.toFixed(1)}s`;
            return;
          }

          if (type === "chunk") {
            const producedNum = Number(produced);
            const totalNum = total !== undefined ? Number(total) : progressBar.max;

            if (!hasWrittenFirst && digits.length > 0) {
              outputBuffer = `${digits[0]}.` + digits.slice(1);
              hasWrittenFirst = true;
            } else {
              outputBuffer += digits;
            }

            // Write output intermittently to keep UI responsive.
            const now = performance.now();
            const shouldFlush = now - lastUpdate > 50 || outputBuffer.length > 5000;
            if (shouldFlush) {
              outputEl.appendChild(document.createTextNode(outputBuffer));
              outputBuffer = "";

              // Update ETA using a smoothed rate based on recent progress.
              const deltaProduced = producedNum - lastProduced;
              const deltaTime = (now - lastUpdate) / 1000;
              const instantRate = deltaProduced / Math.max(deltaTime, 0.001);
              avgRate = avgRate === null ? instantRate : avgRate * 0.80 + instantRate * 0.20;
              lastProduced = producedNum;
              lastUpdate = now;
            }

            // Update progress bar and status.
            const elapsed = (now - startTime) / 1000;
            const remaining = Math.max(0, totalNum - producedNum);
            const eta = avgRate > 0 ? remaining / avgRate : 0;

            progressBar.max = totalNum;
            progressBar.value = producedNum;
            progressEl.textContent = `Computed ${producedNum} / ${totalNum} digits (${(producedNum / totalNum * 100).toFixed(1)}%)`;
            timerEl.textContent = `Elapsed: ${elapsed.toFixed(1)}s | ETA: ${eta.toFixed(1)}s`;
            return;
          }

          if (type === "done") {
            // Flush any buffered digits that haven't been written yet.
            if (outputBuffer.length) {
              outputEl.textContent += outputBuffer;
              outputBuffer = "";
            }
            const elapsed = (performance.now() - startTime) / 1000;
            timerEl.textContent = `Elapsed: ${elapsed.toFixed(1)}s | ETA: 0.0s`;
            progressEl.textContent = "Done!";
            computeBtn.disabled = false;
            stopBtn.disabled = true;
            worker.terminate();
            worker = null;
            URL.revokeObjectURL(url);
            return;
          }
      };

      // Tune chunk size for speed: larger chunks reduce message overhead.
      // For small counts the worker will still finish quickly.
      const chunkSize = Math.max(10000, Math.min(500000, Math.floor(n / 20)));
      worker.postMessage({ type: "start", digits: n, chunk: chunkSize });
    }

    computeBtn.addEventListener("click", () => {
      const n = Number(document.getElementById("digits").value);
      if (!Number.isInteger(n) || n < 1) {
        warningEl.textContent = "Please enter a positive integer.";
        return;
      }

      warningEl.textContent = "";
      outputEl.textContent = "";
      progressEl.textContent = "";

      startWorker(n);
    });

    stopBtn.addEventListener("click", () => {
      if (worker) {
        worker.terminate();
        worker = null;
        progressEl.textContent = "Stopped.";
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
