<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Digits Viewer</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111b2d;
      --panel: #161f38;
      --text: #e8eef6;
      --muted: #a6b1c2;
      --accent: #52b0ff;
      --danger: #ff5c5c;
      --border: rgba(255, 255, 255, 0.12);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #14204b 0%, var(--bg) 70%);
      color: var(--text);
      padding: 32px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      padding: 28px;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: 0.01em;
    }

    p {
      margin-top: 10px;
      margin-bottom: 20px;
      line-height: 1.55;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
    }

    input,
    button {
      font-size: 1rem;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      outline: none;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    input:focus {
      border-color: rgba(82, 176, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(82, 176, 255, 0.22);
    }

    button {
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-top: 8px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    #controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: baseline;
      margin-bottom: 14px;
    }

    #progressBar {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    #timer,
    #progress {
      margin-top: 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    #output {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(20, 32, 60, 0.82);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.35;
      max-height: 360px;
      overflow: auto;
    }

    #warning {
      margin-top: 12px;
      color: var(--danger);
    }
  </style>
</head>
<body>
  <h1>Pi digits (approx)</h1>
  <p>
    Pi is an <strong>infinite, non-repeating</strong> number, so we can only show a finite amount of digits.
    There is no enforced maximum; the computation will keep running until the requested number of digits is reached or you stop it.
  </p>

  <div id="controls">
    <div style="flex: 1; min-width: 220px;">
      <label for="digits">Digits of π</label>
      <input id="digits" type="number" value="200" min="1" />
    </div>

    <div style="display: flex; gap: 12px; align-items: flex-end;">
      <button id="compute">Compute π digits</button>
      <button id="stop" disabled>Stop</button>
    </div>
  </div>

  <div id="warning"></div>
  <progress id="progressBar" value="0" max="0"></progress>
  <div id="progress"></div>
  <div id="timer"></div>
  <div id="output"></div>

  <script>
    const outputEl = document.getElementById("output");
    const warningEl = document.getElementById("warning");
    const progressEl = document.getElementById("progress");
    const timerEl = document.getElementById("timer");
    const progressBar = document.getElementById("progressBar");
    const computeBtn = document.getElementById("compute");
    const stopBtn = document.getElementById("stop");

    let worker;

    function startWorker(n) {
      if (typeof Worker === "undefined") {
        warningEl.textContent = "Web Workers are not supported in this browser.";
        return;
      }

      // Create a worker from an inline blob so the page works even when opened via file://
      const workerScript = `
        self.onmessage = (event) => {
          const { type, digits, chunk } = event.data;
          if (type === "start") {
            computePi(digits, chunk || 1000);
          }
        };

        function computePi(n, chunkSize) {
          let q = 1n;
          let r = 0n;
          let t = 1n;
          let k = 1n;
          let nDigit = 3n;
          let l = 3n;

          let produced = 0;
          let buffer = "";

          postMessage({ type: "started", digits: n });

          while (produced < n) {
            if (4n * q + r - t < nDigit * t) {
              buffer += nDigit.toString();

              const qNew = q * 10n;
              const rNew = 10n * (r - nDigit * t);
              const nNew = (10n * (3n * q + r)) / t - 10n * nDigit;

              q = qNew;
              r = rNew;
              nDigit = nNew;

              produced += 1;
            } else {
              const qNew = q * k;
              const rNew = (2n * q + r) * l;
              const tNew = t * l;
              const nNew = (q * (7n * k + 2n) + r * l) / (t * l);

              q = qNew;
              r = rNew;
              t = tNew;
              k += 1n;
              nDigit = nNew;
              l += 2n;
            }

            if (buffer.length >= chunkSize || produced >= n) {
              postMessage({ type: "chunk", digits: buffer, produced });
              buffer = "";
            }
          }

          postMessage({ type: "done" });
        }
      `;

      const blob = new Blob([workerScript], { type: "application/javascript" });
      const url = URL.createObjectURL(blob);
      worker = new Worker(url);

      worker.onerror = (event) => {
        warningEl.textContent = `Worker error: ${event.message}`;
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      };

      worker.onmessageerror = (event) => {
        warningEl.textContent = "Worker message handling error.";
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      };

      let hasWrittenFirst = false;

      let outputBuffer = "";
      let lastUpdate = 0;
      let startTime = 0;
      let lastProduced = 0;

      worker.onmessage = (event) => {
        const { type, digits } = event.data;

        if (type === "started") {
          warningEl.textContent = "";
          outputEl.textContent = "| ";
          progressBar.max = digits;
          progressBar.value = 0;
          progressEl.textContent = `Starting computation for ${digits} digits...`;
          timerEl.textContent = `Elapsed: 0.0s | ETA: calculating...`;
          computeBtn.disabled = true;
          stopBtn.disabled = false;
          hasWrittenFirst = false;
          outputBuffer = "";
          startTime = performance.now();
          lastProduced = 0;
          lastUpdate = performance.now();
          return;
        }

        if (type === "chunk") {
          if (!hasWrittenFirst && digits.length > 0) {
            outputBuffer = `${digits[0]}.` + digits.slice(1);
            hasWrittenFirst = true;
          } else {
            outputBuffer += digits;
          }

          // Write output intermittently to keep UI responsive.
          const now = performance.now();
          if (now - lastUpdate > 50 || outputBuffer.length > 5000) {
            outputEl.textContent += outputBuffer;
            outputBuffer = "";
            lastUpdate = now;
          }

          // Update progress and ETA.
          const produced = event.data.produced;
          const elapsed = (now - startTime) / 1000;
          const rate = produced / Math.max(elapsed, 0.001);
          const remaining = Math.max(0, event.data.digits ? progressBar.max - produced : 0);
          const eta = rate > 0 ? (remaining / rate) : 0;

          progressBar.value = produced;
          progressEl.textContent = `Computed ${produced} / ${progressBar.max} digits (${(produced / progressBar.max * 100).toFixed(1)}%)`;
          timerEl.textContent = `Elapsed: ${elapsed.toFixed(1)}s | ETA: ${eta.toFixed(1)}s`;

          return;
        }

        if (type === "done") {
          // Flush any buffered digits that haven't been written yet.
          if (outputBuffer.length) {
            outputEl.textContent += outputBuffer;
            outputBuffer = "";
          }
          const elapsed = (performance.now() - startTime) / 1000;
          timerEl.textContent = `Elapsed: ${elapsed.toFixed(1)}s | ETA: 0.0s`;
          progressEl.textContent = "Done!";
          computeBtn.disabled = false;
          stopBtn.disabled = true;
          worker.terminate();
          worker = null;
          URL.revokeObjectURL(url);
          return;
        }
      };

      // Increase chunk size for faster generation. This controls how often the worker
      // sends updates back to the main thread.
      worker.postMessage({ type: "start", digits: n, chunk: 200000 });
    }

    computeBtn.addEventListener("click", () => {
      const n = Number(document.getElementById("digits").value);
      if (!Number.isInteger(n) || n < 1) {
        warningEl.textContent = "Please enter a positive integer.";
        return;
      }

      warningEl.textContent = "";
      outputEl.textContent = "";
      progressEl.textContent = "";

      startWorker(n);
    });

    stopBtn.addEventListener("click", () => {
      if (worker) {
        worker.terminate();
        worker = null;
        progressEl.textContent = "Stopped.";
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
