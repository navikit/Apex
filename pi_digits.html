<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Digits Viewer</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 8px;
      width: 100%;
      max-width: 320px;
      box-sizing: border-box;
    }

    #output {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 360px;
      overflow: auto;
      background: #fafafa;
    }

    #warning {
      margin-top: 8px;
      color: #b00;
    }
  </style>
</head>
<body>
  <h1>Pi digits (approx)</h1>
  <p>
    Pi is an <strong>infinite, non-repeating</strong> number, so we can only show a finite amount of digits.
    For speed, this page limits the output to <strong>10,000 digits</strong> by default.
  </p>

  <label for="digits">Digits of π:</label>
  <input id="digits" type="number" value="200" min="1" max="10000" />
  <button id="compute">Compute π digits</button>

  <div id="warning"></div>
  <div id="progress"></div>
  <div id="output"></div>

  <script>
    const MAX_DIGITS = 10000;
    const CHUNK_SIZE = 20; // digits per animation frame slice

    // Pi digit generator (BBP-like spigot) computed in chunks so UI stays responsive.
    function computePiDigitsAsync(n, onProgress, onDone) {
      const digits = [];

      // Use BigInt for accuracy on larger digit counts.
      let q = 1n;
      let r = 0n;
      let t = 1n;
      let k = 1n;
      let nDigit = 3n;
      let l = 3n;

      function step() {
        const end = Math.min(n, digits.length + CHUNK_SIZE);

        while (digits.length < end) {
          if (4n * q + r - t < nDigit * t) {
            digits.push(Number(nDigit));

            const qNew = q * 10n;
            const rNew = 10n * (r - nDigit * t);
            const nNew = (10n * (3n * q + r)) / t - 10n * nDigit;

            q = qNew;
            r = rNew;
            nDigit = nNew;
          } else {
            const qNew = q * k;
            const rNew = (2n * q + r) * l;
            const tNew = t * l;
            const nNew = (q * (7n * k + 2n) + r * l) / (t * l);

            q = qNew;
            r = rNew;
            t = tNew;
            k += 1n;
            nDigit = nNew;
            l += 2n;
          }
        }

        onProgress(digits.length, n);
        if (digits.length < n) {
          requestAnimationFrame(step);
        } else {
          onDone(digits);
        }
      }

      step();
    }

    const outputEl = document.getElementById("output");
    const warningEl = document.getElementById("warning");
    const progressEl = document.getElementById("progress");

    document.getElementById("compute").addEventListener("click", () => {
      const n = Number(document.getElementById("digits").value);
      if (!Number.isInteger(n) || n < 1) {
        warningEl.textContent = "Please enter a positive integer.";
        return;
      }

      if (n > MAX_DIGITS) {
        warningEl.textContent = `For performance reasons, max is ${MAX_DIGITS} digits.`;
        return;
      }

      warningEl.textContent = "";
      outputEl.textContent = "Computing...";
      progressEl.textContent = "";

      computePiDigitsAsync(n + 1, (done, total) => {
        progressEl.textContent = `Computed ${done} / ${total} digits...`;
      }, (digits) => {
        const pi = digits[0] + "." + digits.slice(1).join("");
        progressEl.textContent = "Done!";
        outputEl.textContent = pi;
      });
    });
  </script>
</body>
</html>
