<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Digits Viewer</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 8px;
      width: 100%;
      max-width: 320px;
      box-sizing: border-box;
    }

    #output {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 360px;
      overflow: auto;
      background: #fafafa;
    }

    #warning {
      margin-top: 8px;
      color: #b00;
    }
  </style>
</head>
<body>
  <h1>Pi digits (approx)</h1>
  <p>
    Pi is an <strong>infinite, non-repeating</strong> number, so we can only show a finite amount of digits.
    There is no enforced maximum; the computation will keep running until the requested number of digits is reached or you stop it.
  </p>

  <label for="digits">Digits of π:</label>
  <input id="digits" type="number" value="200" min="1" />
  <button id="compute">Compute π digits</button>
  <button id="stop" disabled>Stop</button>

  <div id="warning"></div>
  <div id="progress"></div>
  <div id="output"></div>

  <script>
    const outputEl = document.getElementById("output");
    const warningEl = document.getElementById("warning");
    const progressEl = document.getElementById("progress");
    const computeBtn = document.getElementById("compute");
    const stopBtn = document.getElementById("stop");

    let worker;

    function startWorker(n) {
      if (typeof Worker === "undefined") {
        warningEl.textContent = "Web Workers are not supported in this browser.";
        return;
      }

      worker = new Worker("./pi_worker.js");

      let hasWrittenFirst = false;

      worker.onmessage = (event) => {
        const { type, digits, digits: count } = event.data;

        if (type === "started") {
          warningEl.textContent = "";
          outputEl.textContent = "";
          progressEl.textContent = `Starting computation for ${digits} digits...`;
          computeBtn.disabled = true;
          stopBtn.disabled = false;
          hasWrittenFirst = false;
          return;
        }

        if (type === "chunk") {
          if (!hasWrittenFirst && digits.length > 0) {
            outputEl.textContent = `${digits[0]}.`;
            if (digits.length > 1) {
              outputEl.textContent += digits.slice(1).join("");
            }
            hasWrittenFirst = true;
          } else {
            outputEl.textContent += digits.join("");
          }

          const digitCount = hasWrittenFirst ? outputEl.textContent.length - 2 : 0;
          progressEl.textContent = `Computed ${digitCount} digits...`;
          return;
        }

        if (type === "done") {
          progressEl.textContent = "Done!";
          computeBtn.disabled = false;
          stopBtn.disabled = true;
          worker.terminate();
          worker = null;
          return;
        }
      };

      worker.postMessage({ type: "start", digits: n, chunk: 1000 });
    }

    computeBtn.addEventListener("click", () => {
      const n = Number(document.getElementById("digits").value);
      if (!Number.isInteger(n) || n < 1) {
        warningEl.textContent = "Please enter a positive integer.";
        return;
      }

      warningEl.textContent = "";
      outputEl.textContent = "";
      progressEl.textContent = "";

      startWorker(n);
    });

    stopBtn.addEventListener("click", () => {
      if (worker) {
        worker.terminate();
        worker = null;
        progressEl.textContent = "Stopped.";
        computeBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
